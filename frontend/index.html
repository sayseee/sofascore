<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-Powered Football Analytics Platform">
    <title>Sofascore Analytics - AI Football Intelligence</title>
    <link rel="stylesheet" href="css/dark-theme.css">
    <link rel="stylesheet" href="css/layout.css"> 
    <base href="/">
</head>
<body>
    <div id="app">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-brand">
                <span class="brand-icon">⚽</span>
                <span class="brand-name">Sofascore Analytics</span>
            </div>
            <div class="topbar-date">
                <input type="date" id="datePicker" class="date-picker">
                <button id="loadDateBtn" class="btn-sm">Load</button>
            </div>
            <div class="topbar-stats">
                <span id="matchCount">0 matches</span>
                <span id="valueCount" class="value-indicator">0 value bets</span>
            </div>
        </header>

        <!-- Main Layout -->
        <div class="app-layout">
            <!-- Left Panel - Filters & Search -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3>🔍 Search</h3>
                    <input type="text" id="searchInput" placeholder="Search teams..." class="search-input">
                </div>
                
                <div class="sidebar-section">
                    <h3>🏆 Tournaments</h3>
                    <div id="tournamentFilters" class="filter-list">
                        <label class="filter-item active">
                            <input type="radio" name="tournament" value="all" checked> All
                        </label>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>📊 Status</h3>
                    <div class="filter-list">
                        <label class="filter-item active">
                            <input type="radio" name="status" value="all" checked> All Matches
                        </label>
                        <label class="filter-item">
                            <input type="radio" name="status" value="scheduled"> Scheduled
                        </label>
                        <label class="filter-item">
                            <input type="radio" name="status" value="live"> Live
                        </label>
                        <label class="filter-item">
                            <input type="radio" name="status" value="finished"> Finished
                        </label>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>💎 Value Bets</h3>
                    <div id="sidebarValueBets">
                        <p class="text-muted">Loading...</p>
                    </div>
                </div>
            </aside>

            <!-- Main Content - Scheduled Matches -->
            <main class="main-area">
                <!-- Match Table -->
                <div class="match-table-container">
                    <table class="match-table" id="matchTable">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Home</th>
                                <th></th>
                                <th>Away</th>
                                <th>Tournament</th>
                                <th>1</th>
                                <th>X</th>
                                <th>2</th>
                                <th>Edge</th>
                            </tr>
                        </thead>
                        <tbody id="matchTableBody">
                            <tr>
                                <td colspan="9" class="loading-text">Loading matches...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="pagination" id="pagination">
                    <span id="pageInfo">Page 1</span>
                </div>
            </main>

            <!-- Right Panel - Match Detail & Insights -->
            <aside class="detail-panel" id="detailPanel">
                <div class="detail-placeholder">
                    <p>👈 Select a match to view details</p>
                </div>
            </aside>
        </div>

        <!-- Bottom Status Bar -->
        <footer class="statusbar">
            <span>Data updated: <span id="lastUpdated">--</span></span>
            <span>Auto-refresh: <span id="refreshCountdown">off</span></span>
            <button id="refreshBtn" class="btn-sm">🔄 Refresh</button>
        </footer>
    </div>

    <script type="module" src="js/app-spa.js"></script>
</body>
</html>
