<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-Powered Football Analytics Platform">
    <title>Sofascore Analytics - AI Football Intelligence</title>
    <link rel="stylesheet" href="css/dark-theme.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/skeleton.css">
    <base href="/">
</head>
<body>
    <div id="app">
        <!-- Top Bar - Compact with status inline -->
        <header class="topbar">
            <div class="topbar-left">
                <span class="brand-icon">⚽</span>
                <span class="brand-name">Sofascore Analytics</span>
            </div>
            
            <div class="topbar-center">
                <input type="date" id="datePicker" class="date-picker">
                <button id="loadDateBtn" class="btn-sm">Load</button>
            </div>
            
            <div class="topbar-right">
                <span id="matchCount" class="topbar-stat">0 matches</span>
                <span class="topbar-separator">|</span>
                <span id="valueCount" class="topbar-stat value-indicator">0 value bets</span>
                <span class="topbar-separator">|</span>
                <span class="topbar-stat">Updated: <span id="lastUpdated">--</span></span>
                <button id="refreshBtn" class="btn-sm">🔄</button>
            </div>
        </header>

        <!-- Status Bar - Inline right above content -->
        <div class="status-bar">
            <div class="status-left">
                <span class="status-label">SCHEDULED EVENTS</span>
                <span class="status-date" id="statusDate">2026-05-10</span>
            </div>
            <div class="status-right">
                <span class="status-filter">
                    Show: 
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="scheduled">Scheduled</button>
                    <button class="filter-btn" data-filter="live">Live</button>
                    <button class="filter-btn" data-filter="finished">Finished</button>
                </span>
            </div>
        </div>

        <!-- Main Layout -->
        <div class="app-layout">
            <!-- Left Panel - Filters & Search -->
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3>🔍 Search</h3>
                    <input type="text" id="searchInput" placeholder="Search teams..." class="search-input">
                </div>
                
                <div class="sidebar-section">
                    <h3>🏆 Tournaments</h3>
                    <div id="tournamentFilters" class="filter-list">
                        <label class="filter-item active">
                            <input type="radio" name="tournament" value="all" checked> All
                        </label>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>📊 Odds Markets</h3>
                    <div class="filter-list">
                        <label class="filter-item active">
                            <input type="radio" name="oddsMarket" value="1X2" checked> 1X2 (Full Time)
                        </label>
                        <label class="filter-item">
                            <input type="radio" name="oddsMarket" value="btts"> Both Teams to Score
                        </label>
                        <label class="filter-item">
                            <input type="radio" name="oddsMarket" value="over_under_2.5"> Over/Under 2.5
                        </label>
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>💎 Value Bets</h3>
                    <div id="sidebarValueBets">
                        <p class="text-muted">Loading...</p>
                    </div>
                </div>
            </aside>

            <!-- Main Content - Scheduled Matches -->
            <main class="main-area">
                <!-- Match Table -->
                <div class="match-table-container">
                    <table class="match-table" id="matchTable">
                        <thead>
                            <tr>
                                <th class="col-time">Time</th>
                                <th class="col-home">Home</th>
                                <th class="col-score">Score</th>
                                <th class="col-away">Away</th>
                                <th class="col-tournament">Tournament</th>
                                <th class="col-odds">1</th>
                                <th class="col-odds">X</th>
                                <th class="col-odds">2</th>
                                <th class="col-edge">Edge</th>
                            </tr>
                        </thead>
                        <tbody id="matchTableBody">
                            <tr>
                                <td colspan="9" class="loading-text">Loading matches...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>

            <!-- Right Panel - Match Detail & Insights -->
            <aside class="detail-panel" id="detailPanel">
                <div class="detail-placeholder">
                    <p>👈 Select a match to view details</p>
                </div>
            </aside>
        </div>
    </div>

    <script type="module" src="js/app-spa.js"></script>
</body>
</html>
